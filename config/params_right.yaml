/**:
    ros__parameters:
      # Device Configuration
      video_device: "/dev/video2"
      framerate: 30.0
      io_method: "mmap"
      
      # Image Format and Resolution
      pixel_format: "mjpeg2rgb"  # Options: mjpeg2rgb, yuyv, uyvy, rgb24, grey, yu12, etc.
      av_device_format: "YUV422P"
      image_width: 1920
      image_height: 1080
      
      # Frame IDs and Names
      frame_id: "camera_right"
      camera_name: "camera_right"
      
      # Camera Intrinsics (calibration file)
      camera_info_url: "package://usb_cam/config/camera_info_right.yaml"
      
      # Auto Exposure Settings
      autoexposure: true
      exposure: 100  # Manual exposure value (used when autoexposure is false)
      
      # Auto White Balance
      auto_white_balance: true
      white_balance: 4000  # Manual white balance temp in K (used when auto is false)
      
      # Auto Focus
      autofocus: false
      focus: -1  # Manual focus value (-1 for auto/default)
      
      # Image Quality Parameters
      brightness: -1  # -1 uses device default, range typically 0-255
      contrast: -1    # -1 uses device default
      saturation: -1  # -1 uses device default
      sharpness: -1   # -1 uses device default
      gain: -1        # -1 uses device default

